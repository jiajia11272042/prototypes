<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>功能四 - 终止盖章</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, 'PingFang SC', sans-serif; }
  body { background: #f5f6fa; padding: 24px; }
  .contract-header { background: #fff; border-radius: 8px; padding: 20px 24px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  h2 { font-size: 18px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
  .meta { color: #666; font-size: 13px; }
  .seal-status-card { background: #fff; border-radius: 8px; padding: 20px 24px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .seal-status-card .title { font-size: 15px; font-weight: 600; color: #1a1a1a; margin-bottom: 16px; }
  .status-row { display: flex; align-items: center; justify-content: space-between; }
  .status-badge { display: inline-block; padding: 6px 16px; border-radius: 20px; font-size: 14px; font-weight: 500; }
  .status-approving { background: #e6f7ff; color: #1890ff; border: 1px solid #91d5ff; }
  .terminate-btn { padding: 8px 20px; background: #fff1f0; color: #f5222d; border: 1px solid #ffa39e; border-radius: 6px; font-size: 14px; cursor: pointer; font-weight: 500; }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; }
  .dialog { background: #fff; border-radius: 8px; width: 480px; padding: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
  .dialog h3 { font-size: 16px; font-weight: 600; margin-bottom: 20px; color: #1a1a1a; }
  .form-item { margin-bottom: 16px; }
  .form-item label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; }
  .form-item label .required { color: #f5222d; }
  .select { padding: 8px 12px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 14px; width: 100%; background: #fff; }
  .form-item textarea { padding: 8px 12px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 14px; width: 100%; background: #fff; resize: none; line-height: 1.6; }
  .form-item .hint { font-size: 12px; color: #999; margin-top: 4px; }
  .alert-info { background: #f6ffed; border: 1px solid #b7eb8f; border-radius: 6px; padding: 10px 12px; margin-bottom: 16px; }
  .alert-info p { font-size: 12px; color: #389e0d; line-height: 1.6; }
  .dialog-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; padding-top: 16px; border-top: 1px solid #f0f0f0; }
  .btn { padding: 8px 20px; border-radius: 6px; font-size: 14px; cursor: pointer; border: none; font-weight: 500; }
  .btn-default { background: #fff; border: 1px solid #d9d9d9; color: #333; }
  .btn-danger { background: #ff4d4f; color: #fff; }
  .role-tip { display: inline-block; background: #f0f5ff; color: #2f54eb; font-size: 12px; padding: 2px 8px; border-radius: 4px; margin-left: 8px; vertical-align: middle; }
</style>
</head>
<body>
<div style="max-width: 900px; margin: 0 auto;">
  <div class="contract-header">
    <h2>合同详情 · CRM-2024-001</h2>
    <p class="meta">某某科技有限公司 · 广告-Miads · 新签合同</p>
  </div>

  <div class="seal-status-card">
    <div class="title">盖章状态</div>
    <div class="status-row">
      <div>
        <span class="status-badge status-approving">审批中</span>
        <span style="margin-left: 12px; font-size: 13px; color: #666;">发起于 2026-04-08 10:30</span>
      </div>
      <button class="terminate-btn">终止盖章 <span class="role-tip">综管 / 国际销管</span></button>
    </div>
  </div>
</div>

<!-- 终止盖章弹窗 -->
<div class="overlay">
  <div class="dialog">
    <h3>终止盖章</h3>
    <div class="form-item">
      <label>终止原因 <span class="required">*</span></label>
      <select class="select">
        <option value="">请选择终止原因</option>
        <option>客户违约</option>
        <option selected>协商终止</option>
        <option>政策合规要求</option>
        <option>内部审核要求</option>
        <option>其他</option>
      </select>
    </div>
    <div class="alert-info">
      <p>✓ 操作将直接向集团合同系统发起终止，盖章状态变更为「已终止」。<br>操作人、时间及终止原因将写入合同操作日志，不可撤销。</p>
    </div>
    <div class="dialog-footer">
      <button class="btn btn-default">取消</button>
      <button class="btn btn-danger">确认终止</button>
    </div>
  </div>
</div>
</body>
</html>
