<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>功能四 - 第二位审批人Banner</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, 'PingFang SC', sans-serif; }
  body { background: #f5f6fa; padding: 24px; }
  .pending-banner { background: #fff7e6; border: 1px solid #ffd591; border-radius: 8px; padding: 16px 20px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(250,140,22,0.15); }
  .banner-left { display: flex; align-items: center; gap: 12px; }
  .banner-icon { font-size: 24px; }
  .banner-text h4 { font-size: 14px; font-weight: 600; color: #7c4a00; margin-bottom: 4px; }
  .banner-text p { font-size: 13px; color: #ad6800; }
  .banner-text .reason { display: inline-block; background: #ffe58f; border-radius: 4px; padding: 1px 8px; font-size: 12px; color: #7c4a00; margin-top: 4px; }
  .banner-actions { display: flex; gap: 8px; }
  .btn { padding: 7px 18px; border-radius: 6px; font-size: 14px; cursor: pointer; border: none; font-weight: 500; }
  .btn-danger { background: #ff4d4f; color: #fff; }
  .btn-default { background: #fff; border: 1px solid #d9d9d9; color: #333; }
  .card { background: #fff; border-radius: 8px; padding: 20px 24px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .card-title { font-size: 15px; font-weight: 600; color: #1a1a1a; margin-bottom: 16px; }
  .info-row { display: flex; gap: 24px; margin-bottom: 12px; }
  .info-item { flex: 1; }
  .info-item label { font-size: 12px; color: #999; margin-bottom: 4px; display: block; }
  .info-item .val { font-size: 14px; color: #333; }
  .seal-status { display: inline-block; padding: 4px 12px; background: #fff7e6; color: #fa8c16; border: 1px solid #ffd591; border-radius: 12px; font-size: 13px; font-weight: 500; }
  h2 { font-size: 18px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
  .meta { color: #666; font-size: 13px; margin-bottom: 20px; }
</style>
</head>
<body>
<div style="max-width: 900px; margin: 0 auto;">
  <h2>合同详情 · CRM-2024-001</h2>
  <p class="meta">某某科技有限公司 · 广告-Miads · 新签合同</p>

  <div class="pending-banner">
    <div class="banner-left">
      <div class="banner-icon">🔔</div>
      <div class="banner-text">
        <h4>终止盖章待您确认</h4>
        <p>张三（综管）申请终止此合同盖章</p>
        <span class="reason">终止原因：协商终止</span>
        <p style="margin-top: 6px; font-size: 12px; color: #999;">申请时间：2026-04-10 14:23 &nbsp; 等待中（已等待 12 分钟）</p>
      </div>
    </div>
    <div class="banner-actions">
      <button class="btn btn-default">拒绝</button>
      <button class="btn btn-danger">同意终止</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">盖章状态</div>
    <div class="info-row">
      <div class="info-item">
        <label>当前状态</label>
        <div class="val"><span class="seal-status">🟡 盖章终止待确认</span></div>
      </div>
      <div class="info-item">
        <label>申请发起人</label>
        <div class="val">张三（综管）</div>
      </div>
      <div class="info-item">
        <label>申请时间</label>
        <div class="val">2026-04-10 14:23</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">基本信息</div>
    <div class="info-row">
      <div class="info-item">
        <label>合同编号</label>
        <div class="val">CRM-2024-001</div>
      </div>
      <div class="info-item">
        <label>合同类型</label>
        <div class="val">广告-Miads 新签</div>
      </div>
      <div class="info-item">
        <label>签署日期</label>
        <div class="val">2026-04-01</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
